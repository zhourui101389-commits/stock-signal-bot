data_source: yfinance   # yfinance（云端，免费）或 moomoo（本地 OpenD）

scheduler:
  timezone: Asia/Shanghai
  hours: [21, 22, 23, 0]   # 北京时间每晚9点到12点，每整点一次
  minute: 0
  day_of_week: mon-fri

signals:
  min_strength: 30        # 低于此分值不推送
  lookback_days: 250      # 日线数量
  lookback_weeks: 104     # 周线数量

indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  ma_short: 20
  ma_long: 50
  ma_trend: 200

portfolio:
  total_capital: 50000    # 总资金
  currency: AUD           # 货币单位（显示用）
  max_position_pct: 0.10  # 单只股票最大仓位比例（10%）

watchlist:
  moomoo_group: US          # 从 Moomoo 账户哪个分组拉取自选股
  pinned_symbols:           # 每天必推，不受强度阈值过滤
    - MU
    - SOXL
  # 仓位分层：决定每只股票的操作指引风格和建议仓位
  tier_core:        [MU, NVDA, MRVL]          # 核心仓，分3批建仓，止损-8%
  tier_swing:       [TSLA, DRAM, ASX, MXL, WDC, SNDK, INTC]  # 机动仓，止损-6%
  tier_speculative: [SOXL]                    # 投机仓，止损-4%，只做当日信号
  default_symbols:          # fallback：Moomoo 拉不到时使用
    - AAPL
    - MSFT
    - NVDA
    - TSLA
    - AMZN

economic_calendar:
  finnhub_api_key: ""    # 免费注册：https://finnhub.io → API Keys
  days_before: 1         # 显示前 N 天（已公布+实际值）
  days_after: 3          # 显示后 N 天（预估值+预判）
  min_impact: medium     # high = 只看高影响；medium = 高+中

logging:
  level: INFO
  file: ./logs/app.log
