name: Daily Stock Scan

on:
  schedule:
    # 13:07 UTC ≈ 9:07 EDT（美股开盘前后），盘前扫描
    # 整点(0分)故意避开：GitHub Actions在整点扎堆触发，高峰期经常被直接丢弃而不只是延迟
    - cron: '7 13 * * 1-5'
    # 19:12 UTC ≈ 15:12 EDT（收盘前1小时，power hour），盘中复查
    - cron: '12 19 * * 1-5'
    # 21:17 UTC ≈ 17:17 EDT（美股收盘后1小时），盘后复盘
    - cron: '17 21 * * 1-5'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '运行模式（scan=仅扫描 / review=仅复盘 / review_force=跳过日期检查强制补发复盘 / portfolio=查询Alpaca持仓快报 / test_buy=测试买入 / test_sell=测试卖出 / test_ai=AI连接诊断 / 留空=两者）'
        required: false
        default: ''
      test_buy_symbol:
        description: '仅scan_mode=test_buy时生效：测试买入的股票代码'
        required: false
        default: 'QQQ'
      test_buy_qty:
        description: '仅scan_mode=test_buy时生效：测试买入的股数'
        required: false
        default: '1'
      test_sell_symbol:
        description: '仅scan_mode=test_sell时生效：测试卖出（全部平仓）的股票代码'
        required: false
        default: 'QQQ'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 判断运行模式
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.scan_mode }}" ]; then
            echo "SCAN_MODE=${{ github.event.inputs.scan_mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "7 13 * * 1-5" ]; then
            echo "SCAN_MODE=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "12 19 * * 1-5" ]; then
            echo "SCAN_MODE=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "17 21 * * 1-5" ]; then
            echo "SCAN_MODE=review" >> $GITHUB_OUTPUT
          else
            echo "SCAN_MODE=" >> $GITHUB_OUTPUT
          fi

      - name: 运行扫描/复盘
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          DB_PATH: /tmp/signals.db
          DATA_SOURCE: yfinance
          PREDICTIONS_FILE: data/predictions.json
          SCAN_MODE: ${{ steps.mode.outputs.SCAN_MODE }}
          TEST_BUY_SYMBOL: ${{ github.event.inputs.test_buy_symbol }}
          TEST_BUY_QTY: ${{ github.event.inputs.test_buy_qty }}
          TEST_SELL_SYMBOL: ${{ github.event.inputs.test_sell_symbol }}

        run: python scripts/cloud_scan.py

      - name: 提交预测数据到 repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json
          git diff --staged --quiet || git commit -m "chore: 更新预测数据 $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
