name: Daily Stock Scan

on:
  schedule:
    # 13:07 UTC ≈ 9:07 EDT（美股开盘前后），盘前扫描
    # 整点(0分)故意避开：GitHub Actions在整点扎堆触发，高峰期经常被直接丢弃而不只是延迟
    - cron: '7 13 * * 1-5'
    # 19:12 UTC ≈ 15:12 EDT（收盘前1小时，power hour），盘中复查
    - cron: '12 19 * * 1-5'
    # 21:17 UTC ≈ 17:17 EDT（美股收盘后1小时），盘后复盘
    - cron: '17 21 * * 1-5'
    # 盘前哨兵：8:05-12:35 UTC ≈ 4:05-8:35 EDT，每30分钟一次，纯yfinance检测
    # 不烧AI配额，只有异动超阈值才触发完整分析（见 _run_extended_watch）。
    # 原来是每20分钟一次(15个触发点)，跟主扫描一起把这个workflow的schedule
    # 触发数堆到近30个/天——实测过9:07ET主扫描当天被GitHub Actions完全丢弃
    # （官方文档写明高负载会直接丢弃触发，不只是延迟），降到每30分钟(10个
    # 触发点)减少排队拥堵；main()里新加的_catch_up_missed_scan()自愈逻辑
    # 兜底剩下的风险——就算某次触发还是被丢，当天后续任何一次tick都会
    # 检测到并补跑
    - cron: '5,35 8-12 * * 1-5'
    # 盘后哨兵：20:05-23:35 UTC ≈ 16:05-19:35 EDT，同样降到每30分钟一次
    - cron: '5,35 20-23 * * 1-5'
    # 盘中免费检查点：开盘后约30/90/150分钟(10:09/11:23/12:41 EDT)，
    # 纯技术面扫描(RSI/MACD/均线/ATR，yfinance免费数据本地算)，不调用
    # Claude/Gemini，不产生任何AI费用；也不触发_run_execution，纯展示
    # 不下单——技术面SELL信号没有AI确认就不该拿去自动平仓
    - cron: '9 14 * * 1-5'
    - cron: '23 15 * * 1-5'
    - cron: '41 16 * * 1-5'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '运行模式（scan=仅扫描 / scan_free=纯技术面免费扫描不调AI不下单 / review=仅复盘 / review_force=跳过日期检查强制补发复盘 / portfolio=查询Alpaca持仓快报 / extended_watch=手动触发盘前盘后哨兵 / test_buy=测试买入 / test_sell=测试卖出 / test_ai=AI连接诊断 / test_data=行情诊断 / test_shadow=影子模式(Gemini)连接诊断 / 留空=两者）'
        required: false
        default: ''
      test_buy_symbol:
        description: '仅scan_mode=test_buy时生效：测试买入的股票代码'
        required: false
        default: 'QQQ'
      test_buy_qty:
        description: '仅scan_mode=test_buy时生效：测试买入的股数'
        required: false
        default: '1'
      test_sell_symbol:
        description: '仅scan_mode=test_sell时生效：测试卖出（全部平仓）的股票代码'
        required: false
        default: 'QQQ'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 判断运行模式
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.scan_mode }}" ]; then
            echo "SCAN_MODE=${{ github.event.inputs.scan_mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "7 13 * * 1-5" ]; then
            echo "SCAN_MODE=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "12 19 * * 1-5" ]; then
            echo "SCAN_MODE=scan" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "17 21 * * 1-5" ]; then
            echo "SCAN_MODE=review" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "5,35 8-12 * * 1-5" ]; then
            echo "SCAN_MODE=extended_watch" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "5,35 20-23 * * 1-5" ]; then
            echo "SCAN_MODE=extended_watch" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "9 14 * * 1-5" ]; then
            echo "SCAN_MODE=scan_free" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "23 15 * * 1-5" ]; then
            echo "SCAN_MODE=scan_free" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "41 16 * * 1-5" ]; then
            echo "SCAN_MODE=scan_free" >> $GITHUB_OUTPUT
          else
            echo "SCAN_MODE=" >> $GITHUB_OUTPUT
          fi

      - name: 运行扫描/复盘
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          DB_PATH: /tmp/signals.db
          DATA_SOURCE: yfinance
          PREDICTIONS_FILE: data/predictions.json
          SCAN_MODE: ${{ steps.mode.outputs.SCAN_MODE }}
          TEST_BUY_SYMBOL: ${{ github.event.inputs.test_buy_symbol }}
          TEST_BUY_QTY: ${{ github.event.inputs.test_buy_qty }}
          TEST_SELL_SYMBOL: ${{ github.event.inputs.test_sell_symbol }}

        run: python scripts/cloud_scan.py

      - name: 提交预测数据到 repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json
          git diff --staged --quiet || git commit -m "chore: 更新预测数据 $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
